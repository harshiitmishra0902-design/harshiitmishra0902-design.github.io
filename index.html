<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Harshit Mishra | Portfolio</title>

    <style>
        /* --- ORIGINAL BASE STYLES --- */
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body{
            font-family:'Poppins',sans-serif;
            background:#02040a;
            color:white;
            overflow-x:hidden;
            padding-top: 80px; /* Space for the fixed navbar */
        }

        /* Masterpiece Background Animation - Liquid Copper & Cosmic Violet */
        body::before{
            content:'';
            position:fixed;
            width:100%;
            height:100%;
            background:
            radial-gradient(circle at top left, rgba(255, 123, 0, 0.15), transparent 35%),
            radial-gradient(circle at bottom right, rgba(138, 43, 226, 0.15), transparent 35%);
            z-index:-1;
        }

        /* --- FIXED NAVIGATION BAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background-color: #05070f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10%;
            z-index: 2000;
            border-bottom: 1px solid rgba(255, 123, 0, 0.1);
        }

        /* Left Side Brand Logo Style */
        .nav-logo {
            font-family: 'Poppins', sans-serif;
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-decoration: none;
        }

        .nav-logo span {
            color: #ff7b00;
        }

        /* Right Side Nav Links */
        .nav-links {
            display: flex;
            gap: 35px;
            list-style: none;
            align-items: center;
        }

        .nav-links li a, .nav-links li button {
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 700;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            transition: color 0.3s ease;
        }

        .nav-links li a:hover, .nav-links li button:hover {
            color: #ff7b00;
        }

        /* HEADER WITH SIDE-BY-SIDE LAYOUT */
        header{
            min-height: calc(100vh - 80px);
            display:flex;
            justify-content:center;
            align-items:center;
            gap: 50px;
            padding: 40px 10%;
            position:relative;
        }

        /* Profile Picture Styling */
        .profile-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 350px;
        }

        .profile-pic {
            width: 100%;
            max-width: 300px;
            height: auto;
            border-radius: 50%;
            border: 3px solid #ff7b00;
            box-shadow: 0 0 30px rgba(255, 123, 0, 0.4);
            object-fit: cover;
            aspect-ratio: 1 / 1;
            animation: fadeIn 1.5s ease;
        }

        /* Header Text Content Wrapper */
        .header-content {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
        }

        /* Animated Letters */
        .name{
            display:flex;
            font-size:70px;
            font-family:'Orbitron',sans-serif;
            font-weight:bold;
            color:#ff7b00;
            text-shadow: 0 0 20px rgba(255, 123, 0, 0.2);
        }

        .name span{
            opacity:0;
            transform:translateY(-100px);
            animation:drop 0.7s forwards;
        }

        .name span:nth-child(1){animation-delay:0.1s;}
        .name span:nth-child(2){animation-delay:0.2s;}
        .name span:nth-child(3){animation-delay:0.3s;}
        .name span:nth-child(4){animation-delay:0.4s;}
        .name span:nth-child(5){animation-delay:0.5s;}
        .name span:nth-child(6){animation-delay:0.6s;}
        .name span:nth-child(7){animation-delay:0.7s;}

        @keyframes drop{
            to{
                opacity:1;
                transform:translateY(0);
            }
        }

        .surname{
            font-size:50px;
            margin-top:10px;
            letter-spacing:8px;
            color:#8a2be2;
            animation:glow 2s infinite alternate;
            font-family:'Orbitron',sans-serif;
        }

        @keyframes glow{
            from{ text-shadow:0 0 10px rgba(138, 43, 226, 0.8); }
            to{ text-shadow:0 0 30px rgba(138, 43, 226, 1); }
        }

        /* Description */
        .intro{
            margin-top:30px;
            width:100%;
            max-width:800px;
            font-size:20px;
            line-height:1.8;
            color:#ddd;
            animation:fadeIn 2s ease;
        }

        @keyframes fadeIn{
            from{ opacity:0; }
            to{ opacity:1; }
        }

        /* Button Styling */
        .portfolio-buttons {
            margin-top: 25px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            animation: fadeIn 2s ease;
        }

        .btn {
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
        }

        .btn-contact {
            color: #ff7b00;
            border: 2px solid #ff7b00;
            box-shadow: 0 0 5px rgba(255, 123, 0, 0.2);
        }
        .btn-contact:hover {
            background: #ff7b00;
            color: #02040a;
            box-shadow: 0 0 15px rgba(255, 123, 0, 0.6);
        }

        .btn-review {
            color: #8a2be2;
            border: 2px solid #8a2be2;
            box-shadow: 0 0 5px rgba(138, 43, 226, 0.2);
        }
        .btn-review:hover {
            background: #8a2be2;
            color: #02040a;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.6);
        }

        .btn-about {
            color: #ffffff;
            border: 2px solid #ffffff;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.2);
        }
        .btn-about:hover {
            background: #ffffff;
            color: #02040a;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.6);
        }

        /* --- CENTERING MODAL POPUP STYLING --- */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 3000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background-color: #0b0e17;
            color: #ffffff;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px;
            border: 1px solid
